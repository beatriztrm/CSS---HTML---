<H1>CRIAR ELEMENTOS</H1>
<P>Criar HTML pelo JavaScript</P>
<hr>

<input class="inputItem" placeholder="Digite um item.."/>

<button onclick="criar()">adicionar a lista</button>

<ul class="listaCompras">
    <li>Pão</li>
    <li>Manteiga</li>
</ul>

<script>

function criar(){

    let item = document.querySelector(".inputItem").value
    document.querySelector(".listaCompras").innerHTML += "<li>"+item+"</li>"

}

</script>
